<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | logging</title>
    <link rel="shortcut icon" href="assets/Logo-full.png" type="image/x-icon">
    <!-- DaisyUI and tailwind css -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- google fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- icone -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
    *{
        font-family: "Outfit", sans-serif;
    }
</style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto ">
    
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-2">
                <div class="logo w-[60px]">

                
                <img src="assets/logo.png" >
            </div>
            <div class="balance-info">
                <h2 class="text-2xl font-bold">$ <span id="balance">10000000.00</span></h2>
                <p class="text-neutral/50">Available Balance</p>
            </div>
            </div>


            
            <div class="right">
                <a href="/index.html" class="btn btn-soft"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Sabbir's<span class="text-primary">Bank</span></h2>
         <p class="text-neutral/50">Manage your finances with ease and security.<br>
        Cashback on every transaction!</p>

        <div class="buttons grid grid-cols-3 gap-3 ">
            <button onclick="showOnly('add-money')" class="btn flex-col h-full  py-4 btn-primary btn-soft">
                <img src="assets/opt-1.png">
                <p class="text-sm">Add Money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn flex-col h-full  py-4 btn-primary btn-soft">
                <img src="assets/opt-2.png">
                <p class="text-sm">Cashout</p>
            </button>
            <button class="btn flex-col h-full  py-4 btn-primary btn-soft">
                <img src="assets/opt-3.png">
                <p class="text-sm">Send Money</p>
            </button>
            <button class="btn flex-col h-full  py-4 btn-primary btn-soft">
                <img src="assets/opt-4.png">
                <p class="text-sm">Get Bonus</p>
            </button>
            <button class="btn flex-col h-full  py-4 btn-primary btn-soft">
                <img src="assets/opt-5.png">
                <p class="text-sm">Pay Bills</p>
            </button>
            <button onclick="showOnly('history')" class="btn flex-col h-full  py-4 btn-primary btn-soft">
                <img src="assets/opt-6.png">
                <p class="text-sm">Transactions</p>
            </button>
        </div>
    </section>
    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
         <h2 class="text-3xl font-bold mb-5">Add Money</h2>
        <div class="card bg-base-100 w-full   shadow-2xl  rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
             <label class="label text-neutral font-bold">Select Bank</label>
            <select id="add-money-bank"class="select w-full rounded-full">
             <option disabled selected>Pick a Bank</option>
            <option value="DBBL">DBBL</option>
           <option value="CITY Bank">CITY Bank</option>
          <option value="Islami Bank">Islami Bank</option>
              </select>
          <label class="label text-neutral font-bold">Bank Account Number</label>
          <input id="add-money-number" type="text" maxlength="11" minlength="11" class="input rounded-full w-full" 
          placeholder="Inter your Bank Account Number" />

          <br>
          <label class="label text-neutral font-bold">Amount </label>
          <input id="add-money-amount" type="number" class="input rounded-full w-full" 
          placeholder="Inter add money amount" />
          <br>

          <label class="label text-neutral font-bold">4 Digit PIN</label>
          <input id="add-money-pin" type="password" maxlength="4" class="input rounded-full w-full" placeholder="Enter 4 digit PIN" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button id ="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
        </fieldset>
      </div>
    </div>

    </section>
    
    <section id="cashout" class="w-11/12 mx-auto py-5 hidden ">
        <h2 class="text-3xl font-bold mb-5">Cashout</h2>
        <div class="card bg-base-100 w-full   shadow-2xl  rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="cashout-number" type="text" maxlength="11" minlength="11" class="input rounded-full w-full" 
          placeholder="Inter your 11 digit Agent Number" />
          <br>
          <label class="label text-neutral font-bold">Amount </label>
          <input id="cashout-amount" type="number" class="input rounded-full w-full" 
          placeholder="Inter cashout amount" />
          <br>

          <label class="label text-neutral font-bold">4 Digit PIN</label>
          <input id="cashout-pin" type="password" maxlength="4" class="input rounded-full w-full" placeholder="Enter 4 digit PIN" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button id ="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
        
    </section>
    <section id="history" class="w-11/12 mx-auto py-5 space-y-5 hidden ">
        <h2 class="text-3xl font-bold mb-5">Transaction History</h2>
        <div class="" id="history-container">
          
        </div>
    </section>
     
    <script src="script/machine.js"></script>
    <script src="script/addMoney.js"></script>
    <script src="script/cashout.js"></script>
    
    
</body>
</html>
